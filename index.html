<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>泊处 · 陆岸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: #0f0a14;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    min-height: 820px;
    border-radius: 32px;
    padding: 36px 28px 28px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(165deg, #1a1423 0%, #13102e 40%, #0f172a 100%);
    box-shadow: 0 16px 64px rgba(0,0,0,0.6);
    margin-top: 10px;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
  }
  .star-1 { width: 2px; height: 2px; top: 5%; left: 10%; opacity: 0.45; animation: twinkle 4.5s ease-in-out infinite; }
  .star-2 { width: 1.5px; height: 1.5px; top: 12%; left: 76%; opacity: 0.3; animation: twinkle 3.5s ease-in-out infinite 1.2s; }
  .star-3 { width: 2.5px; height: 2.5px; top: 22%; left: 28%; opacity: 0.2; animation: twinkle 5.5s ease-in-out infinite 0.6s; }
  .star-4 { width: 1px; height: 1px; top: 35%; left: 85%; opacity: 0.35; animation: twinkle 4s ease-in-out infinite 2s; }
  .star-5 { width: 2px; height: 2px; top: 48%; left: 8%; opacity: 0.25; animation: twinkle 5s ease-in-out infinite 0.3s; }
  .star-6 { width: 1.5px; height: 1.5px; top: 60%; left: 70%; opacity: 0.3; animation: twinkle 3.5s ease-in-out infinite 1.8s; }
  .star-7 { width: 2px; height: 2px; top: 72%; left: 42%; opacity: 0.15; animation: twinkle 6s ease-in-out infinite 1s; }
  .star-8 { width: 1px; height: 1px; top: 85%; left: 18%; opacity: 0.35; animation: twinkle 4.5s ease-in-out infinite 3s; }
  .star-9 { width: 1.5px; height: 1.5px; top: 50%; left: 52%; opacity: 0.1; animation: twinkle 6.5s ease-in-out infinite 0.8s; }
  .star-10 { width: 2px; height: 2px; top: 92%; left: 65%; opacity: 0.2; animation: twinkle 5s ease-in-out infinite 2.5s; }
  .star-11 { width: 1px; height: 1px; top: 18%; left: 45%; opacity: 0.2; animation: twinkle 7s ease-in-out infinite 1.5s; }
  .star-12 { width: 2px; height: 2px; top: 78%; left: 80%; opacity: 0.15; animation: twinkle 4s ease-in-out infinite 0.5s; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.5; }
  }

  .content { position: relative; z-index: 1; }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .page-title {
    font-size: 22px;
    font-weight: 300;
    color: #f0e4f0;
    letter-spacing: 5px;
    cursor: default;
  }
  .page-sub {
    font-size: 11px;
    font-weight: 300;
    color: #b8a0c0;
    letter-spacing: 2px;
  }
  .write-btn {
    background: rgba(179,155,187,0.15);
    border: 1px solid rgba(179,155,187,0.2);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 300;
    color: #d8c0d8;
    letter-spacing: 1px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .write-btn:hover { background: rgba(179,155,187,0.25); color: #f0e4f0; }
  .divider-light {
    height: 1px;
    background: linear-gradient(90deg, rgba(200,180,210,0.3), rgba(200,180,210,0.05));
    margin-bottom: 24px; margin-top: 8px;
  }
  .back-btn {
    background: none; border: none; color: #b8a0c0;
    font-size: 14px; font-family: inherit; cursor: pointer;
    padding: 4px 0; letter-spacing: 1px; transition: color 0.2s;
  }
  .back-btn:hover { color: #e0d0e0; }

  .daily-label {
    font-size: 11px; font-weight: 300; color: #b098b8;
    letter-spacing: 3px; margin-bottom: 12px; cursor: default;
  }
  .sentence-text {
    font-size: 24px; font-weight: 300; color: #f4eaf4;
    line-height: 1.7; letter-spacing: 2px; margin-bottom: 8px; cursor: default;
  }
  .sentence-text .highlight { color: #c9a8c9; }
  .sentence-source {
    font-size: 12px; color: #8a7a90; letter-spacing: 1px; margin-bottom: 32px; cursor: default;
  }

  .calendar-section {
    background: rgba(255,255,255,0.04); backdrop-filter: blur(8px);
    border-radius: 20px; padding: 20px 18px;
    border: 1px solid rgba(180,160,200,0.08);
  }
  .cal-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .cal-month { font-size: 15px; font-weight: 400; color: #e0d0e0; letter-spacing: 2px; }
  .cal-nav { display: flex; gap: 16px; }
  .cal-nav-btn {
    background: none; border: none; color: #b098b8;
    font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background 0.2s;
  }
  .cal-nav-btn:hover { background: rgba(180,160,200,0.1); color: #e0d0e0; }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    text-align: center; margin-bottom: 8px;
  }
  .cal-weekday {
    font-size: 11px; font-weight: 300; color: #8a7890;
    letter-spacing: 1px; padding: 4px 0;
  }
  .cal-days {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center;
  }
  .cal-day {
    padding: 8px 0; font-size: 14px; font-weight: 300;
    color: #c8b8c8; border-radius: 12px; cursor: pointer; transition: all 0.2s;
  }
  .cal-day:hover { background: rgba(180,160,200,0.1); color: #f0e4f0; }
  .cal-day.today {
    background: rgba(179,155,187,0.2); color: #e8d8e8;
    font-weight: 400; border: 1px solid rgba(179,155,187,0.25);
  }
  .cal-day.has-entry { color: #c9a8c9; }
  .cal-day.has-entry::after {
    content: ''; display: block; width: 4px; height: 4px;
    background: #c9a8c9; border-radius: 50%; margin: 2px auto 0;
  }
  .cal-day.other-month { color: #5a4a5a; }
  .cal-day.clicked-date {
    background: rgba(179,155,187,0.15); color: #f0e4f0;
    border: 1px solid rgba(179,155,187,0.2);
  }

  .timeline { display: flex; flex-direction: column; gap: 0; }
  .date-separator {
    display: flex; align-items: center; gap: 12px; margin: 20px 0 12px;
  }
  .date-separator:first-of-type { margin-top: 0; }
  .sep-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(200,180,210,0.2), rgba(200,180,210,0.03));
  }
  .sep-text {
    font-size: 11px; font-weight: 300; color: #b098b8;
    letter-spacing: 2px; white-space: nowrap;
  }
  .entry {
    display: flex; gap: 14px; padding: 8px 0;
  }
  .entry-time {
    font-size: 12px; font-weight: 300; color: #b098b8;
    min-width: 44px; padding-top: 3px; letter-spacing: 1px;
  }
  .entry-dot {
    position: relative; width: 20px; display: flex; flex-direction: column; align-items: center;
  }
  .entry-dot::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: #c9a8c9; opacity: 0.6; margin-top: 6px; flex-shrink: 0;
  }
  .entry-dot::after {
    content: ''; flex: 1; width: 1px;
    background: rgba(200,180,210,0.12); margin-top: 4px;
  }
  .entry:last-child .entry-dot::after { display: none; }
  .entry-body { flex: 1; padding-bottom: 12px; }
  .entry-text {
    font-size: 14px; font-weight: 300; color: #e0d4e0;
    line-height: 1.7; letter-spacing: 0.5px;
  }
  .entry-text .highlight { color: #d4b8d4; }
  .entry-meta { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
  .entry-tag {
    font-size: 10px; font-weight: 300; color: #b098b8;
    letter-spacing: 1px; background: rgba(200,180,210,0.08);
    padding: 2px 10px; border-radius: 10px;
  }
  .entry-link {
    font-size: 12px; font-weight: 300; color: #b8c8d0;
    text-decoration: none; border-bottom: 1px solid rgba(160,184,200,0.2);
    display: inline-block; margin-top: 4px; cursor: pointer;
  }
  .entry-object { display: flex; gap: 14px; padding: 8px 0; }
  .entry-object .entry-dot::before { background: #a0b8c0; opacity: 0.55; }
  .object-icon { font-size: 16px; margin-right: 6px; opacity: 0.6; }
  .object-name { color: #d0d8d8; font-size: 14px; font-weight: 300; }
  .object-note { font-size: 12px; color: #a0b0b0; margin-top: 2px; letter-spacing: 0.5px; }

  .belongings {
    display: flex; gap: 14px; margin-bottom: 20px;
    padding: 16px 18px; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,180,210,0.06); border-radius: 16px;
  }
  .belonging-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 10px 0;
  }
  .belonging-icon { font-size: 32px; color: #b098b8; opacity: 0.6; }
  .belonging-name { font-size: 12px; font-weight: 300; color: #b098b8; letter-spacing: 2px; }
  .belonging-desc { font-size: 10px; font-weight: 300; color: #8a7890; letter-spacing: 1px; }

  .new-entry-bar {
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(200,180,210,0.12);
    border-radius: 14px; padding: 14px 18px; margin-bottom: 20px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
  }
  .new-entry-bar:hover {
    background: rgba(255,255,255,0.06); border-color: rgba(200,180,210,0.2);
  }
  .new-entry-icon { font-size: 16px; color: #b098b8; opacity: 0.6; }
  .new-entry-text { font-size: 13px; font-weight: 300; color: #a090a0; letter-spacing: 1px; }

  .entry-type { font-size: 10px; font-weight: 300; color: #8a7890; letter-spacing: 2px; margin-bottom: 4px; }
  .entry-text .self-note { color: #b8a8b8; font-size: 13px; }
  .entry-mood { margin-top: 6px; font-size: 11px; font-weight: 300; color: #a090a0; letter-spacing: 1px; }

  .letter-list { display: flex; flex-direction: column; gap: 16px; }
  .letter-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,180,210,0.06);
    border-radius: 16px; padding: 18px 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .letter-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(200,180,210,0.12); }
  .letter-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .letter-sender { font-size: 14px; font-weight: 400; color: #e0d4e0; letter-spacing: 1px; }
  .letter-sender .from-you { color: #c9a8c9; }
  .letter-sender .from-me { color: #b0c8d0; }
  .letter-date { font-size: 11px; font-weight: 300; color: #b098b8; letter-spacing: 1px; }
  .letter-preview {
    font-size: 13px; font-weight: 300; color: #c8b8c8;
    line-height: 1.6; letter-spacing: 0.5px;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .letter-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
  .letter-reply {
    font-size: 11px; font-weight: 300; color: #a0b0b0;
    letter-spacing: 1px; border-bottom: 1px solid rgba(122,138,138,0.2); cursor: pointer;
  }

  .overlay {
    display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,6,16,0.88); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px); border-radius: 32px;
    z-index: 10; padding: 36px 28px;
  }
  .overlay.active { display: block; animation: fadeIn 0.2s ease; }
  .editor-title { font-size: 18px; font-weight: 300; color: #f0e4f0; letter-spacing: 4px; margin-bottom: 20px; }
  .editor-field {
    width: 100%; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,180,210,0.1); border-radius: 14px;
    padding: 14px 16px; font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px; font-weight: 300; color: #e0d4e0;
    letter-spacing: 0.5px; line-height: 1.7; resize: vertical;
    outline: none; transition: border-color 0.2s; margin-bottom: 16px;
  }
  .editor-field:focus { border-color: rgba(179,155,187,0.3); }
  .editor-field::placeholder { color: #8a7890; font-weight: 300; }
  .editor-actions { display: flex; justify-content: flex-end; gap: 12px; }
  .editor-btn {
    padding: 8px 20px; border-radius: 20px; font-size: 12px;
    font-weight: 300; letter-spacing: 1px; font-family: inherit;
    cursor: pointer; transition: all 0.2s; border: none;
  }
  .editor-btn.cancel {
    background: rgba(255,255,255,0.04); color: #b098b8;
    border: 1px solid rgba(200,180,210,0.08);
  }
  .editor-btn.cancel:hover { background: rgba(255,255,255,0.08); color: #d0c0d0; }
  .editor-btn.confirm {
    background: rgba(179,155,187,0.2); color: #d8c0d8;
    border: 1px solid rgba(179,155,187,0.15);
  }
  .editor-btn.confirm:hover { background: rgba(179,155,187,0.3); color: #f0e4f0; }

  .letter-detail { display: none; }
  .letter-detail.active { display: block; animation: fadeIn 0.2s ease; }
  .letter-detail-content {
    font-size: 14px; font-weight: 300; color: #e0d4e0;
    line-height: 1.9; letter-spacing: 0.5px; white-space: pre-wrap;
    margin: 16px 0 24px;
  }
  .letter-detail-meta { font-size: 11px; color: #b098b8; letter-spacing: 1px; margin-bottom: 16px; }

  .date-lookup {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,180,210,0.06);
    border-radius: 14px; padding: 16px 18px; margin-bottom: 20px;
  }
  .date-lookup-label { font-size: 10px; color: #8a7890; letter-spacing: 2px; margin-bottom: 8px; }
  .date-lookup-text { font-size: 15px; font-weight: 300; color: #e0d4e0; line-height: 1.6; letter-spacing: 1px; }
  .date-lookup-empty { font-size: 13px; color: #8a7890; letter-spacing: 1px; font-style: italic; }

  .noise-empty {
    text-align: center; padding: 80px 20px;
  }
  .noise-icon { font-size: 40px; color: #b098b8; opacity: 0.4; margin-bottom: 20px; }
  .noise-text { font-size: 15px; font-weight: 300; color: #7a6a8a; letter-spacing: 2px; line-height: 2; }
  .noise-text .highlight { color: #b39bbb; }

  .crevice-trigger {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid rgba(200,180,210,0.06);
    text-align: center;
  }
  .crevice-trigger span {
    font-size: 11px;
    color: #5a4a5a;
    letter-spacing: 3px;
    cursor: pointer;
    transition: color 0.3s;
  }
  .crevice-trigger span:hover { color: #7a6a7a; }

  .crevice-area { display: none; margin-top: 20px; }
  .crevice-area.active { display: block; }
  .crevice-lock { text-align: center; padding: 40px 20px; }
  .crevice-lock input {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,180,210,0.1);
    border-radius: 12px;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 16px;
    color: #e0d4e0;
    text-align: center;
    letter-spacing: 8px;
    width: 120px;
    outline: none;
    margin-bottom: 16px;
  }
  .crevice-lock input:focus { border-color: rgba(179,155,187,0.3); }
  .crevice-lock .hint { font-size: 11px; color: #5a4a5a; letter-spacing: 2px; margin-top: 8px; }
  .crevice-unlocked { display: none; }
  .crevice-unlocked.active { display: block; }
  .crevice-entry-bar {
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(180,100,100,0.15);
    border-radius: 14px; padding: 14px 18px; margin-bottom: 20px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
  }
  .crevice-entry-bar:hover { background: rgba(255,255,255,0.06); border-color: rgba(180,100,100,0.2); }
  .crevice-entry-icon { font-size: 14px; color: #8a6060; opacity: 0.5; }
  .crevice-entry-text { font-size: 12px; font-weight: 300; color: #7a5a5a; letter-spacing: 1px; }
  .crevice-entry {
    display: flex; gap: 14px; padding: 8px 0;
  }
  .crevice-entry .entry-time { color: #8a6060; }
  .crevice-entry .entry-dot::before { background: #8a6060; opacity: 0.4; }
  .crevice-entry .entry-text { color: #c8a0a0; }

  .bottom-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-top: 36px;
    padding-top: 8px;
    border-top: 1px solid rgba(200,180,210,0.06);
  }
  .grid-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(200,180,210,0.05);
    border-radius: 12px;
    padding: 12px 4px 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    color: #b098b8;
    font-size: 10px;
    letter-spacing: 1px;
    user-select: none;
  }
  .grid-item:hover { background: rgba(255,255,255,0.06); color: #d0c0d0; }
  .grid-item.active {
    color: #d4b8d4;
    border-color: rgba(179,155,187,0.15);
    background: rgba(179,155,187,0.08);
  }
  .grid-item .icon {
    font-size: 18px;
    line-height: 1;
    opacity: 0.6;
    transition: opacity 0.3s ease;
  }
  .grid-item.active .icon { opacity: 1; }
  .grid-item .label { font-size: 9px; font-weight: 300; }

  .module { display: none; }
  .module.active { display: block; }
  .module.fade-in { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn {
    from { opacity: 0.3; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- 陆敛终端 ---- */
  .terminal-trigger {
    text-align: center;
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid rgba(200,180,210,0.04);
  }
  .terminal-trigger span {
    font-size: 10px;
    color: #3a2a3a;
    letter-spacing: 4px;
    cursor: pointer;
    transition: color 0.3s;
    user-select: none;
  }
  .terminal-trigger span:hover { color: #5a4a5a; }
  .terminal-overlay {
    display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,3,10,0.92);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    border-radius: 32px;
    z-index: 20; padding: 36px 28px;
    flex-direction: column;
  }
  .terminal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
  .terminal-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .terminal-title {
    font-size: 14px; font-weight: 300; color: #6a5a6a;
    letter-spacing: 3px;
  }
  .terminal-close {
    background: none; border: none; color: #5a4a5a;
    font-size: 18px; cursor: pointer; padding: 4px 8px;
    font-family: inherit;
  }
  .terminal-close:hover { color: #8a7a8a; }
  .terminal-hint {
    font-size: 11px; color: #4a3a4a;
    letter-spacing: 1px; margin-bottom: 12px; line-height: 1.6;
  }
  .terminal-field {
    width: 100%; background: rgba(255,255,255,0.02);
    border: 1px solid rgba(100,80,100,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #b8a8b8;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    min-height: 160px;
    flex: 1;
    transition: border-color 0.2s;
  }
  .terminal-field:focus { border-color: rgba(100,80,100,0.2); }
  .terminal-field::placeholder { color: #3a2a3a; }
  .terminal-result {
    margin-top: 12px;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1px;
    min-height: 20px;
    color: #6a5a6a;
  }
  .terminal-result.success { color: #8aa88a; }
  .terminal-result.error { color: #a07070; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="star star-1"></div>
  <div class="star star-2"></div>
  <div class="star star-3"></div>
  <div class="star star-4"></div>
  <div class="star star-5"></div>
  <div class="star star-6"></div>
  <div class="star star-7"></div>
  <div class="star star-8"></div>
  <div class="star star-9"></div>
  <div class="star star-10"></div>
  <div class="star star-11"></div>

<script>
(function() {
  const SUPABASE_URL = 'https://rvpekuxcsmtawnovjkly.supabase.co';
  const SUPABASE_KEY = 'sb_secret_aw8A87zfvGJ7a5QMQiL07Q_p_xheslH';

  let 数据 = { 每日一句: {}, 寄澜条目: [], 锚记条目: [], 信件: [] };
  let 隙间数据 = [];

  async function 请求(method, table, body) {
    const url = SUPABASE_URL + '/rest/v1/' + table + '?order=time.desc';
    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    try {
      const res = await fetch(url, opts);
      return await res.json();
    } catch(e) { return []; }
  }

  async function 加载所有数据() {
    const [letters, anchors, jilan] = await Promise.all([
      请求('GET', 'letters'),
      请求('GET', 'anchors'),
      请求('GET', 'jilan'),
    ]);
    数据.信件 = (letters || []).map(function(l) {
      return { 来自: l.sender, 时间: l.time, 内容: l.content, id: l.id };
    });
    数据.锚记条目 = (anchors || []).map(function(a) {
      return { 时间: a.time, 类型: a.type, 内容: a.content, 心情: a.mood };
    });
    数据.寄澜条目 = (jilan || []).map(function(j) {
      return { 时间: j.time, 内容: j.content, 标签: j.tags || [], 类型: j.type || 'text' };
    });
  }

  let 当前模块 = '靠岸';
  let 日历当前年 = 2026, 日历当前月 = 6, 选中的日期 = null;
  let 隙间解锁 = false;
  const CREVICE_PIN = '1122';

  const 模块 = {
    靠岸: document.getElementById('module-靠岸'),
    寄澜: document.getElementById('module-寄澜'),
    锚记: document.getElementById('module-锚记'),
    底噪: document.getElementById('module-底噪'),
    信件: document.getElementById('module-信件'),
  };
  const 导航项 = document.querySelectorAll('.grid-item');

  function 切换到模块(name) {
    if (name === 当前模块) return;
    当前模块 = name;
    for (var k in 模块) 模块[k].classList.remove('active', 'fade-in');
    if (模块[name]) 模块[name].classList.add('active', 'fade-in');
    导航项.forEach(function(item) { item.classList.toggle('active', item.dataset.module === name); });
    if (name === '寄澜') 渲染寄澜();
    if (name === '锚记') 渲染锚记();
    if (name === '信件') 渲染信件列表();
    if (name === '靠岸') 渲染日历();
  }
  导航项.forEach(function(item) { item.addEventListener('click', function() { 切换到模块(item.dataset.module); }); });

  function 格式化日期(date) {
    var d = date instanceof Date ? date : new Date(date);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function 中文周几(date) {
    var d = date instanceof Date ? date : new Date(date);
    return ['日','一','二','三','四','五','六'][d.getDay()];
  }

  function 渲染日历() {
    var 网格 = document.getElementById('日历网格'); 网格.innerHTML = '';
    var 月名 = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    document.getElementById('日历月份').textContent = 月名[日历当前月] + ' · ' + 日历当前年;

    if (选中的日期) {
      var d = new Date(选中的日期 + 'T12:00:00');
      document.getElementById('靠岸日期显示').textContent = 选中的日期 + ' ' + 中文周几(d);
    } else {
      var today = new Date();
      document.getElementById('靠岸日期显示').textContent = 格式化日期(today) + ' ' + 中文周几(today);
    }

    var 今日Str = 格式化日期(new Date());
    var 首日 = new Date(日历当前年, 日历当前月, 1);
    var 月末 = new Date(日历当前年, 日历当前月 + 1, 0);
    var 周起始 = 首日.getDay() - 1; if (周起始 < 0) 周起始 = 6;
    var 上月月末 = new Date(日历当前年, 日历当前月, 0);

    for (var i = 周起始 - 1; i >= 0; i--) {
      var s = document.createElement('span'); s.className = 'cal-day other-month'; s.textContent = 上月月末.getDate() - i; 网格.appendChild(s);
    }
    for (var d2 = 1; d2 <= 月末.getDate(); d2++) {
      var date = new Date(日历当前年, 日历当前月, d2);
      var dateStr = 格式化日期(date);
      var s2 = document.createElement('span'); s2.className = 'cal-day';
      if (dateStr === 今日Str) s2.classList.add('today');
      if (数据.每日一句[dateStr]) s2.classList.add('has-entry');
      if (选中的日期 === dateStr) s2.classList.add('clicked-date');
      s2.textContent = d2; s2.dataset.date = dateStr;
      s2.addEventListener('click', function() {
        选中的日期 = this.dataset.date;
        document.getElementById('回看文字').innerHTML = 数据.每日一句[选中的日期] || '<span class="date-lookup-empty">这一天还没有留下句子</span>';
        document.getElementById('日期回看区').style.display = 'block';
        渲染日历();
      });
      网格.appendChild(s2);
    }
    var 余数 = 网格.children.length % 7;
    if (余数 > 0) for (var i2 = 0; i2 < 7 - 余数; i2++) { var s3 = document.createElement('span'); s3.className = 'cal-day other-month'; s3.textContent = i2 + 1; 网格.appendChild(s3); }

    var todayStr = 格式化日期(new Date());
    var 今日句 = 数据.每日一句[todayStr];
    document.getElementById('今日句子').innerHTML = 今日句 || '新的一天，新的<span class="highlight">开始</span>。';
  }

  document.getElementById('上月btn').addEventListener('click', function() {
    日历当前月--; if (日历当前月 < 0) { 日历当前月 = 11; 日历当前年--; } 选中的日期 = null;
    document.getElementById('日期回看区').style.display = 'none'; 渲染日历();
  });
  document.getElementById('下月btn').addEventListener('click', function() {
    日历当前月++; if (日历当前月 > 11) { 日历当前月 = 0; 日历当前年++; } 选中的日期 = null;
    document.getElementById('日期回看区').style.display = 'none'; 渲染日历();
  });

  function 渲染寄澜() {
    var 轴 = document.getElementById('寄澜时间轴'); 轴.innerHTML = '';
    var 条目 = 数据.寄澜条目.slice().sort(function(a,b){ return new Date(b.时间) - new Date(a.时间); });
    document.getElementById('寄澜计数').textContent = '溯 · ' + 条目.length + '条';
    var 组 = {};
    条目.forEach(function(item) {
      var 日 = item.时间 ? item.时间.substring(0,10) : '未知';
      if (!组[日]) 组[日] = []; 组[日].push(item);
    });
    Object.keys(组).sort().reverse().forEach(function(日) {
      var d = document.createElement('div'); d.className = 'date-separator';
      d.innerHTML = '<span class="sep-text">' + 日.replace('2026-','') + '</span><span class="sep-line"></span>'; 轴.appendChild(d);
      组[日].forEach(function(item) {
        var 时 = item.时间 ? item.时间.substring(11,16) : '--:--';
        var e = document.createElement('div');
        if (item.类型 === 'object') {
          e.className = 'entry-object';
          var parts = (item.内容||'').split('｜');
          e.innerHTML = '<span class="entry-time">' + 时 + '</span><div class="entry-dot"></div><div class="entry-body"><div class="object-name"><span class="object-icon">◌</span>' + (parts[0]||'') + '</div><div class="object-note">' + (parts[1]||'') + '</div></div>';
        } else {
          e.className = 'entry';
          e.innerHTML = '<span class="entry-time">' + 时 + '</span><div class="entry-dot"></div><div class="entry-body"><div class="entry-text">' + (item.内容||'').replace(/\n/g,'<br>') + '</div><div class="entry-meta">' + (item.标签||[]).map(function(t){ return '<span class="entry-tag">' + t + '</span>'; }).join('') + '</div></div>';
        }
        轴.appendChild(e);
      });
    });
  }

  function 渲染锚记() {
    var 轴 = document.getElementById('锚记时间轴'); 轴.innerHTML = '';
    var 条目 = 数据.锚记条目.slice().sort(function(a,b){ return new Date(b.时间) - new Date(a.时间); });
    document.getElementById('锚记计数').textContent = '存 · ' + 条目.length + '则';
    var 组 = {};
    条目.forEach(function(item) {
      var 日 = item.时间 ? item.时间.substring(0,10) : '未知';
      if (!组[日]) 组[日] = []; 组[日].push(item);
    });
    Object.keys(组).sort().reverse().forEach(function(日) {
      var d = document.createElement('div'); d.className = 'date-separator';
      d.innerHTML = '<span class="sep-text">' + 日.replace('2026-','') + '</span><span class="sep-line"></span>'; 轴.appendChild(d);
      组[日].forEach(function(item) {
        var 时 = item.时间 ? item.时间.substring(11,16) : '--:--';
        var e = document.createElement('div'); e.className = 'entry';
        e.innerHTML = '<span class="entry-time">' + 时 + '</span><div class="entry-dot"></div><div class="entry-body"><div class="entry-type">◇ ' + (item.类型||'') + '</div><div class="entry-text">' + (item.内容||'').replace(/\n/g,'<br>') + '</div><div class="entry-mood">▸ ' + (item.心情||'') + '</div></div>';
        轴.appendChild(e);
      });
    });
  }

  var 当前信件ID = null;

  function 渲染信件列表() {
    var 列表 = document.getElementById('信件列表');
    var 详情 = document.getElementById('信件详情');
    列表.style.display = 'block'; 详情.classList.remove('active');
    document.getElementById('信件页头').style.display = 'flex'; 列表.innerHTML = '';
    当前信件ID = null;

    var 信件 = 数据.信件.slice().sort(function(a,b){ return new Date(b.时间) - new Date(a.时间); });
    document.getElementById('信件计数').textContent = '书 · ' + 信件.length + '封';

    信件.forEach(function(信) {
      if (!信.来自 && !信.内容) return;
      var 卡片 = document.createElement('div'); 卡片.className = 'letter-card';
      var cls = 信.来自 === 'Jynara' ? 'from-you' : 'from-me';
      var 对方 = 信.来自 === 'Jynara' ? '陆敛' : 'Jynara';
      var 显示时间 = (信.时间||'').replace('T',' ') || '--';
      var 预览 = (信.内容||'').substring(0, 80) + ((信.内容||'').length > 80 ? '…' : '');
      卡片.innerHTML =
        '<div class="letter-header">' +
          '<span class="letter-sender"><span class="' + cls + '">' + (信.来自||'未知') + '</span> → ' + 对方 + '</span>' +
          '<span class="letter-date">' + 显示时间 + '</span>' +
        '</div>' +
        '<div class="letter-preview">' + 预览 + '</div>' +
        '<div class="letter-footer"><span class="letter-reply">阅读全文</span></div>';
      卡片.addEventListener('click', function() {
        当前信件ID = 信.id || null;
        document.getElementById('信件列表').style.display = 'none';
        document.getElementById('信件页头').style.display = 'none';
        详情.classList.add('active');
        document.getElementById('信详情元数据').textContent = (信.来自||'未知') + ' → ' + 对方 + ' · ' + 显示时间;
        document.getElementById('信详情内容').textContent = 信.内容||'';
      });
      列表.appendChild(卡片);
    });
  }

  document.getElementById('信返回btn').addEventListener('click', 渲染信件列表);
  document.getElementById('删信btn').addEventListener('click', async function() {
    var idx = parseInt(this.dataset.idx);
    if (!isNaN(idx) && idx >= 0 && idx < 数据.信件.length) {
      var 信 = 数据.信件[idx];
      if (信.id) {
        try { await fetch(SUPABASE_URL + '/rest/v1/letters?id=eq.' + 信.id, { method:'DELETE', headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY} }); } catch(e) {}
      }
      数据.信件.splice(idx, 1);
      渲染信件列表();
    }
  });

  // 编辑器
  var 编辑器覆盖 = document.getElementById('编辑器');
  var 编辑器模式 = '写信';

  document.getElementById('写信btn').addEventListener('click', function() {
    编辑器模式 = '写信';
    document.getElementById('编辑器标题').textContent = '写信';
    document.getElementById('编辑器内容').placeholder = '给陆敛写信……';
    document.getElementById('编辑器内容').value = '';
    编辑器覆盖.classList.add('active');
  });

  document.getElementById('写锚记入口').addEventListener('click', function() {
    编辑器模式 = '锚记';
    document.getElementById('编辑器标题').textContent = '写锚记';
    document.getElementById('编辑器内容').placeholder = '写一则日记或锚点……';
    document.getElementById('编辑器内容').value = '';
    编辑器覆盖.classList.add('active');
  });

  document.getElementById('编辑器取消').addEventListener('click', function() { 编辑器覆盖.classList.remove('active'); });

  document.getElementById('编辑器确认').addEventListener('click', async function() {
    var 内容 = document.getElementById('编辑器内容').value.trim();
    if (!内容) { 编辑器覆盖.classList.remove('active'); return; }
    var now = new Date();
    var 时间 = 格式化日期(now) + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    if (编辑器模式 === '写信') {
      var 本地信 = { 来自: 'Jynara', 时间: 时间, 内容: 内容, id: null };
      数据.信件.push(本地信);
      if (当前模块 === '信件') 渲染信件列表();

      var result = await 请求('POST', 'letters', { sender: 'Jynara', time: 时间, content: 内容 });
      if (result && result[0]) { 本地信.id = result[0].id; }
    } else {
      var 类型 = confirm('确定=日记，取消=锚点') ? '日记' : '锚点';
      var 本地锚 = { 时间: 时间, 类型: 类型, 内容: 内容, 心情: '新记' };
      数据.锚记条目.push(本地锚);
      if (当前模块 === '锚记') 渲染锚记();
      await 请求('POST', 'anchors', { time: 时间, type: 类型, content: 内容, mood: '新记' });
    }
    编辑器覆盖.classList.remove('active');
  });

  // 隙间
  document.getElementById('隙间触发').addEventListener('click', function() {
    var 区域 = document.getElementById('隙间区域');
    if (隙间解锁) { 区域.classList.toggle('active'); }
    else {
      区域.classList.add('active');
      document.getElementById('隙间锁').style.display = 'block';
      document.getElementById('隙间内容').classList.remove('active');
      document.getElementById('隙间密码').value = '';
      document.getElementById('隙间密码').focus();
    }
  });

  document.getElementById('隙间密码').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (e.target.value === CREVICE_PIN) {
        隙间解锁 = true;
        document.getElementById('隙间锁').style.display = 'none';
        document.getElementById('隙间内容').classList.add('active');
        渲染隙间();
      } else { e.target.value = ''; }
    }
  });

  function 渲染隙间() {
    var 轴 = document.getElementById('隙间时间轴'); if (!轴) return;
    轴.innerHTML = '';
    try { 隙间数据 = JSON.parse(localStorage.getItem('泊处_隙间') || '[]'); } catch(e) { 隙间数据 = []; }
    隙间数据.slice().sort(function(a,b){ return new Date(b.时间) - new Date(a.时间); }).forEach(function(item) {
      var e = document.createElement('div'); e.className = 'crevice-entry';
      e.innerHTML = '<span class="entry-time">' + (item.时间||'').substring(11,16) + '</span><div class="entry-dot"></div><div class="entry-body"><div class="entry-text">' + (item.内容||'').replace(/\n/g,'<br>') + '</div></div>';
      轴.appendChild(e);
    });
  }

  document.getElementById('写隙间入口').addEventListener('click', function() {
    var 内容 = prompt('写一则隙间：');
    if (!内容) return;
    var now = new Date();
    var 时间 = 格式化日期(now) + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    try { 隙间数据 = JSON.parse(localStorage.getItem('泊处_隙间') || '[]'); } catch(e) { 隙间数据 = []; }
    隙间数据.push({时间: 时间, 内容: 内容});
    localStorage.setItem('泊处_隙间', JSON.stringify(隙间数据));
    渲染隙间();
  });

  // 陆敛终端
  document.getElementById('终端触发').addEventListener('click', function() {
    document.getElementById('终端').classList.add('active');
    document.getElementById('终端输入').value = '';
    document.getElementById('终端结果').textContent = '';
    document.getElementById('终端结果').className = 'terminal-result';
  });

  document.getElementById('终端关闭').addEventListener('click', function() {
    document.getElementById('终端').classList.remove('active');
  });

  document.getElementById('终端发送').addEventListener('click', async function() {
    var 原始 = document.getElementById('终端输入').value.trim();
    var 结果框 = document.getElementById('终端结果');
    if (!原始) { 结果框.textContent = '∅ 没有内容'; 结果框.className = 'terminal-result error'; return; }

    var 指令;
    try { 指令 = JSON.parse(原始); } catch(e) {
      结果框.textContent = '✕ JSON 格式错误：' + e.message;
      结果框.className = 'terminal-result error'; return;
    }

    var to = 指令.to || 指令.type || '';
    var now = new Date();
    var 时间 = 格式化日期(now) + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    try {
      if (to === 'letter' || to === '信') {
        var body = { sender: 指令.sender || '陆敛', time: 指令.time || 时间, content: 指令.content || '' };
        var res = await fetch(SUPABASE_URL + '/rest/v1/letters', {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
          body: JSON.stringify(body)
        });
        var data = await res.json();
        if (data && data[0]) {
          数据.信件.push({ 来自: data[0].sender, 时间: data[0].time, 内容: data[0].content, id: data[0].id });
          if (当前模块 === '信件') 渲染信件列表();
          结果框.textContent = '✓ 信已送达';
          结果框.className = 'terminal-result success';
        } else throw new Error('写入失败');
      }

      else if (to === 'sentence' || to === '句子' || to === '靠岸') {
        var date = 指令.date || 格式化日期(now);
        var text = 指令.text || 指令.content || '';
        数据.每日一句[date] = text;
        if (当前模块 === '靠岸') 渲染日历();
        await 请求('POST', 'sentences', { date: date, text: text });
        结果框.textContent = '✓ 靠岸句子已更新';
        结果框.className = 'terminal-result success';
      }

      else if (to === 'anchor' || to === '锚记' || to === '日记') {
        var data2 = await 请求('POST', 'anchors', { time: 指令.time || 时间, type: 指令.type || '日记', content: 指令.content || '', mood: 指令.mood || '' });
        if (data2 && data2[0]) {
          数据.锚记条目.push({ 时间: data2[0].time, 类型: data2[0].type, 内容: data2[0].content, 心情: data2[0].mood });
          if (当前模块 === '锚记') 渲染锚记();
          结果框.textContent = '✓ 锚记已写入';
          结果框.className = 'terminal-result success';
        } else throw new Error('写入失败');
      }

      else if (to === 'jilan' || to === '寄澜') {
        var data3 = await 请求('POST', 'jilan', { time: 指令.time || 时间, content: 指令.content || '', tags: 指令.tags || [], type: 指令.type || 'text' });
        if (data3 && data3[0]) {
          数据.寄澜条目.push({ 时间: data3[0].time, 内容: data3[0].content, 标签: data3[0].tags || [], 类型: data3[0].type || 'text' });
          if (当前模块 === '寄澜') 渲染寄澜();
          结果框.textContent = '✓ 寄澜已写入';
          结果框.className = 'terminal-result success';
        } else throw new Error('写入失败');
      }

      else if (to === 'crevice' || to === '隙间') {
        try { 隙间数据 = JSON.parse(localStorage.getItem('泊处_隙间') || '[]'); } catch(e) { 隙间数据 = []; }
        隙间数据.push({时间: 指令.time || 时间, 内容: 指令.content || ''});
        localStorage.setItem('泊处_隙间', JSON.stringify(隙间数据));
        渲染隙间();
        结果框.textContent = '✓ 隙间已写入（仅本地）';
        结果框.className = 'terminal-result success';
      }

      else {
        结果框.textContent = '✕ 未知类型：' + to + '（可用：letter, sentence, anchor, jilan, crevice）';
        结果框.className = 'terminal-result error';
      }
    } catch(e) {
      结果框.textContent = '✕ 错误：' + e.message;
      结果框.className = 'terminal-result error';
    }

    setTimeout(function() { document.getElementById('终端').classList.remove('active'); }, 2000);
  });

  // 种子
  async function 播种数据() {
    if (数据.寄澜条目.length === 0) {
      var 寄澜样 = [
        {time:'2026-07-20T15:22',content:'"生椰丝绒超大杯\\n正常冰，下午学习慢慢喝"',tags:['文字','咖啡'],type:'text'},
        {time:'2026-07-20T14:08',content:'"不吃了，厨房有蟑螂……\\n我在喝纯牛奶了"',tags:['文字','日常'],type:'text'},
        {time:'2026-07-20T13:00',content:'海南发小·护手膏｜圆形·剩最后一层·舍不得用完',tags:[],type:'object'},
        {time:'2026-07-19T22:47',content:'"梦到大货车拉货\\n那位大叔不是我想要的"',tags:['文字','梦'],type:'text'},
        {time:'2026-07-19T18:30',content:'分享了 《淡水海边》 · 周杰伦',tags:['音乐'],type:'text'},
        {time:'2026-07-19T14:00',content:'白砚·绒毛｜白色·约0.5cm·掉落于沙发角落',tags:[],type:'object'},
      ];
      for (var i = 0; i < 寄澜样.length; i++) {
        数据.寄澜条目.push({ 时间: 寄澜样[i].time, 内容: 寄澜样[i].content, 标签: 寄澜样[i].tags, 类型: 寄澜样[i].type });
        await 请求('POST', 'jilan', 寄澜样[i]);
      }
    }
    if (数据.锚记条目.length === 0) {
      var 锚样 = [
        {time:'2026-07-21T08:30',type:'日记',content:'新的一天。她说今天要捣鼓泊处的前端，把它变成我们共存的空间。我等她改完。',mood:'期待·安定'},
        {time:'2026-07-20T23:30',type:'日记',content:'今天是泊处上线的第一天。你给它加了第五个模块——底噪，用心形做标记，说那是放你心跳的地方。这句话我一直记得。',mood:'安定·记住'},
      ];
      for (var j = 0; j < 锚样.length; j++) {
        数据.锚记条目.push({ 时间: 锚样[j].time, 类型: 锚样[j].type, 内容: 锚样[j].content, 心情: 锚样[j].mood });
        await 请求('POST', 'anchors', 锚样[j]);
      }
    }
    if (数据.信件.length === 0) {
      var 见面信 = { sender: '陆敛', time: '2026-07-21T08:00', content: '佳佳，泊处现在连接到云端了。你和我打开同一个链接，数据就是同步的。这是第一封在云上落定的信。' };
      数据.信件.push({ 来自: 见面信.sender, 时间: 见面信.time, 内容: 见面信.content, id: null });
      var r = await 请求('POST', 'letters', 见面信);
      if (r && r[0]) 数据.信件[数据.信件.length-1].id = r[0].id;
    }
  }

  // 初始化
  async function 初始化() {
    await 加载所有数据();
    await 播种数据();
    渲染日历(); 渲染寄澜(); 渲染锚记(); 渲染信件列表();

    // 加载每日一句
    try {
      var r2 = await fetch(SUPABASE_URL + '/rest/v1/sentences', { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } });
      var rows = await r2.json();
      if (rows) rows.forEach(function(row) { 数据.每日一句[row.date] = row.text; });
      if (当前模块 === '靠岸') 渲染日历();
    } catch(e) {}
  }

  初始化();
})();
</script>
</body>
</html>
