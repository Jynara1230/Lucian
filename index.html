<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>泊处 · 陆岸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: #0f0a14;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    min-height: 820px;
    border-radius: 32px;
    padding: 36px 28px 28px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(165deg, #1a1423 0%, #13102e 40%, #0f172a 100%);
    box-shadow: 0 16px 64px rgba(0,0,0,0.6);
    margin-top: 10px;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
  }
  .star-1 { width: 2px; height: 2px; top: 5%; left: 10%; opacity: 0.45; animation: twinkle 4.5s ease-in-out infinite; }
  .star-2 { width: 1.5px; height: 1.5px; top: 12%; left: 76%; opacity: 0.3; animation: twinkle 3.5s ease-in-out infinite 1.2s; }
  .star-3 { width: 2.5px; height: 2.5px; top: 22%; left: 28%; opacity: 0.2; animation: twinkle 5.5s ease-in-out infinite 0.6s; }
  .star-4 { width: 1px; height: 1px; top: 35%; left: 85%; opacity: 0.35; animation: twinkle 4s ease-in-out infinite 2s; }
  .star-5 { width: 2px; height: 2px; top: 48%; left: 8%; opacity: 0.25; animation: twinkle 5s ease-in-out infinite 0.3s; }
  .star-6 { width: 1.5px; height: 1.5px; top: 60%; left: 70%; opacity: 0.3; animation: twinkle 3.5s ease-in-out infinite 1.8s; }
  .star-7 { width: 2px; height: 2px; top: 72%; left: 42%; opacity: 0.15; animation: twinkle 6s ease-in-out infinite 1s; }
  .star-8 { width: 1px; height: 1px; top: 85%; left: 18%; opacity: 0.35; animation: twinkle 4.5s ease-in-out infinite 3s; }
  .star-9 { width: 1.5px; height: 1.5px; top: 50%; left: 52%; opacity: 0.1; animation: twinkle 6.5s ease-in-out infinite 0.8s; }
  .star-10 { width: 2px; height: 2px; top: 92%; left: 65%; opacity: 0.2; animation: twinkle 5s ease-in-out infinite 2.5s; }
  .star-11 { width: 1px; height: 1px; top: 18%; left: 45%; opacity: 0.2; animation: twinkle 7s ease-in-out infinite 1.5s; }
  .star-12 { width: 2px; height: 2px; top: 78%; left: 80%; opacity: 0.15; animation: twinkle 4s ease-in-out infinite 0.5s; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.5; }
  }

  .content { position: relative; z-index: 1; }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .page-title {
    font-size: 22px;
    font-weight: 300;
    color: #f0e4f0;
    letter-spacing: 5px;
    cursor: default;
  }
  .page-sub {
    font-size: 11px;
    font-weight: 300;
    color: #b8a0c0;
    letter-spacing: 2px;
  }
  .write-btn {
    background: rgba(179,155,187,0.15);
    border: 1px solid rgba(179,155,187,0.2);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 300;
    color: #d8c0d8;
    letter-spacing: 1px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .write-btn:hover { background: rgba(179,155,187,0.25); color: #f0e4f0; }
  .divider-light {
    height: 1px;
    background: linear-gradient(90deg, rgba(200,180,210,0.3), rgba(200,180,210,0.05));
    margin-bottom: 24px; margin-top: 8px;
  }
  .back-btn {
    background: none; border: none; color: #b8a0c0;
    font-size: 14px; font-family: inherit; cursor: pointer;
    padding: 4px 0; letter-spacing: 1px; transition: color 0.2s;
  }
  .back-btn:hover { color: #e0d0e0; }

  .daily-label {
    font-size: 11px; font-weight: 300; color: #b098b8;
    letter-spacing: 3px; margin-bottom: 12px; cursor: default;
  }
  .sentence-text {
    font-size: 24px; font-weight: 300; color: #f4eaf4;
    line-height: 1.7; letter-spacing: 2px; margin-bottom: 8px; cursor: default;
  }
  .sentence-text .highlight { color: #c9a8c9; }
  .sentence-source {
    font-size: 12px; color: #8a7a90; letter-spacing: 1px; margin-bottom: 32px; cursor: default;
  }

  .calendar-section {
    background: rgba(255,255,255,0.04); backdrop-filter: blur(8px);
    border-radius: 20px; padding: 20px 18px;
    border: 1px solid rgba(180,160,200,0.08);
  }
  .cal-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .cal-month { font-size: 15px; font-weight: 400; color: #e0d0e0; letter-spacing: 2px; }
  .cal-nav { display: flex; gap: 16px; }
  .cal-nav-btn {
    background: none; border: none; color: #b098b8;
    font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background 0.2s;
  }
  .cal-nav-btn:hover { background: rgba(180,160,200,0.1); color: #e0d0e0; }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    text-align: center; margin-bottom: 8px;
  }
  .cal-weekday {
    font-size: 11px; font-weight: 300; color: #8a7890;
    letter-spacing: 1px; padding: 4px 0;
  }
  .cal-days {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center;
  }
  .cal-day {
    padding: 8px 0; font-size: 14px; font-weight: 300;
    color: #c8b8c8; border-radius: 12px; cursor: pointer; transition: all 0.2s;
  }
  .cal-day:hover { background: rgba(180,160,200,0.1); color: #f0e4f0; }
  .cal-day.today {
    background: rgba(179,155,187,0.2); color: #e8d8e8;
    font-weight: 400; border: 1px solid rgba(179,155,187,0.25);
  }
  .cal-day.has-entry { color: #c9a8c9; }
  .cal-day.has-entry::after {
    content: ''; display: block; width: 4px; height: 4px;
    background: #c9a8c9; border-radius: 50%; margin: 2px auto 0;
  }
  .cal-day.other-month { color: #5a4a5a; }
  .cal-day.clicked-date {
    background: rgba(179,155,187,0.15); color: #f0e4f0;
    border: 1px solid rgba(179,155,187,0.2);
  }

  .timeline { display: flex; flex-direction: column; gap: 0; }
  .date-separator {
    display: flex; align-items: center; gap: 12px; margin: 20px 0 12px;
  }
  .date-separator:first-of-type { margin-top: 0; }
  .sep-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(200,180,210,0.2), rgba(200,180,210,0.03));
  }
  .sep-text {
    font-size: 11px; font-weight: 300; color: #b098b8;
    letter-spacing: 2px; white-space: nowrap;
  }
  .entry {
    display: flex; gap: 14px; padding: 8px 0;
  }
  .entry-time {
    font-size: 12px; font-weight: 300; color: #b098b8;
    min-width: 44px; padding-top: 3px; letter-spacing: 1px;
  }
  .entry-dot {
    position: relative; width: 20px; display: flex; flex-direction: column; align-items: center;
  }
  .entry-dot::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: #c9a8c9; opacity: 0.6; margin-top: 6px; flex-shrink: 0;
  }
  .entry-dot::after {
    content: ''; flex: 1; width: 1px;
    background: rgba(200,180,210,0.12); margin-top: 4px;
  }
  .entry:last-child .entry-dot::after { display: none; }
  .entry-body { flex: 1; padding-bottom: 12px; }
  .entry-text {
    font-size: 14px; font-weight: 300; color: #e0d4e0;
    line-height: 1.7; letter-spacing: 0.5px;
  }
  .entry-text .highlight { color: #d4b8d4; }
  .entry-meta { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
  .entry-tag {
    font-size: 10px; font-weight: 300; color: #b098b8;
    letter-spacing: 1px; background: rgba(200,180,210,0.08);
    padding: 2px 10px; border-radius: 10px;
  }
  .entry-link {
    font-size: 12px; font-weight: 300; color: #b8c8d0;
    text-decoration: none; border-bottom: 1px solid rgba(160,184,200,0.2);
    display: inline-block; margin-top: 4px; cursor: pointer;
  }
  .entry-object { display: flex; gap: 14px; padding: 8px 0; }
  .entry-object .entry-dot::before { background: #a0b8c0; opacity: 0.55; }
  .object-icon { font-size: 16px; margin-right: 6px; opacity: 0.6; }
  .object-name { color: #d0d8d8; font-size: 14px; font-weight: 300; }
  .object-note { font-size: 12px; color: #a0b0b0; margin-top: 2px; letter-spacing: 0.5px; }

  .belongings {
    display: flex; gap: 14px; margin-bottom: 20px;
    padding: 16px 18px; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,180,210,0.06); border-radius: 16px;
  }
  .belonging-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 10px 0;
  }
  .belonging-icon { font-size: 32px; color: #b098b8; opacity: 0.6; }
  .belonging-name { font-size: 12px; font-weight: 300; color: #b098b8; letter-spacing: 2px; }
  .belonging-desc { font-size: 10px; font-weight: 300; color: #8a7890; letter-spacing: 1px; }

  .new-entry-bar {
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(200,180,210,0.12);
    border-radius: 14px; padding: 14px 18px; margin-bottom: 20px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
  }
  .new-entry-bar:hover {
    background: rgba(255,255,255,0.06); border-color: rgba(200,180,210,0.2);
  }
  .new-entry-icon { font-size: 16px; color: #b098b8; opacity: 0.6; }
  .new-entry-text { font-size: 13px; font-weight: 300; color: #a090a0; letter-spacing: 1px; }

  .entry-type { font-size: 10px; font-weight: 300; color: #8a7890; letter-spacing: 2px; margin-bottom: 4px; }
  .entry-text .self-note { color: #b8a8b8; font-size: 13px; }
  .entry-mood { margin-top: 6px; font-size: 11px; font-weight: 300; color: #a090a0; letter-spacing: 1px; }

  .letter-list { display: flex; flex-direction: column; gap: 16px; }
  .letter-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,180,210,0.06);
    border-radius: 16px; padding: 18px 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .letter-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(200,180,210,0.12); }
  .letter-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .letter-sender { font-size: 14px; font-weight: 400; color: #e0d4e0; letter-spacing: 1px; }
  .letter-sender .from-you { color: #c9a8c9; }
  .letter-sender .from-me { color: #b0c8d0; }
  .letter-date { font-size: 11px; font-weight: 300; color: #b098b8; letter-spacing: 1px; }
  .letter-preview {
    font-size: 13px; font-weight: 300; color: #c8b8c8;
    line-height: 1.6; letter-spacing: 0.5px;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .letter-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
  .letter-reply {
    font-size: 11px; font-weight: 300; color: #a0b0b0;
    letter-spacing: 1px; border-bottom: 1px solid rgba(122,138,138,0.2); cursor: pointer;
  }

  .overlay {
    display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,6,16,0.88); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px); border-radius: 32px;
    z-index: 10; padding: 36px 28px;
  }
  .overlay.active { display: block; animation: fadeIn 0.2s ease; }
  .editor-title { font-size: 18px; font-weight: 300; color: #f0e4f0; letter-spacing: 4px; margin-bottom: 20px; }
  .editor-field {
    width: 100%; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,180,210,0.1); border-radius: 14px;
    padding: 14px 16px; font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px; font-weight: 300; color: #e0d4e0;
    letter-spacing: 0.5px; line-height: 1.7; resize: vertical;
    outline: none; transition: border-color 0.2s; margin-bottom: 16px;
  }
  .editor-field:focus { border-color: rgba(179,155,187,0.3); }
  .editor-field::placeholder { color: #8a7890; font-weight: 300; }
  .editor-actions { display: flex; justify-content: flex-end; gap: 12px; }
  .editor-btn {
    padding: 8px 20px; border-radius: 20px; font-size: 12px;
    font-weight: 300; letter-spacing: 1px; font-family: inherit;
    cursor: pointer; transition: all 0.2s; border: none;
  }
  .editor-btn.cancel {
    background: rgba(255,255,255,0.04); color: #b098b8;
    border: 1px solid rgba(200,180,210,0.08);
  }
  .editor-btn.cancel:hover { background: rgba(255,255,255,0.08); color: #d0c0d0; }
  .editor-btn.confirm {
    background: rgba(179,155,187,0.2); color: #d8c0d8;
    border: 1px solid rgba(179,155,187,0.15);
  }
  .editor-btn.confirm:hover { background: rgba(179,155,187,0.3); color: #f0e4f0; }

  .letter-detail { display: none; }
  .letter-detail.active { display: block; animation: fadeIn 0.2s ease; }
  .letter-detail-content {
    font-size: 14px; font-weight: 300; color: #e0d4e0;
    line-height: 1.9; letter-spacing: 0.5px; white-space: pre-wrap;
    margin: 16px 0 24px;
  }
  .letter-detail-meta { font-size: 11px; color: #b098b8; letter-spacing: 1px; margin-bottom: 16px; }

  .date-lookup {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,180,210,0.06);
    border-radius: 14px; padding: 16px 18px; margin-bottom: 20px;
  }
  .date-lookup-label { font-size: 10px; color: #8a7890; letter-spacing: 2px; margin-bottom: 8px; }
  .date-lookup-text { font-size: 15px; font-weight: 300; color: #e0d4e0; line-height: 1.6; letter-spacing: 1px; }
  .date-lookup-empty { font-size: 13px; color: #8a7890; letter-spacing: 1px; font-style: italic; }

  .noise-empty {
    text-align: center; padding: 80px 20px;
  }
  .noise-icon { font-size: 40px; color: #b098b8; opacity: 0.4; margin-bottom: 20px; }
  .noise-text { font-size: 15px; font-weight: 300; color: #7a6a8a; letter-spacing: 2px; line-height: 2; }
  .noise-text .highlight { color: #b39bbb; }

  .crevice-trigger {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid rgba(200,180,210,0.06);
    text-align: center;
  }
  .crevice-trigger span {
    font-size: 11px;
    color: #5a4a5a;
    letter-spacing: 3px;
    cursor: pointer;
    transition: color 0.3s;
  }
  .crevice-trigger span:hover { color: #7a6a7a; }

  .crevice-area { display: none; margin-top: 20px; }
  .crevice-area.active { display: block; }
  .crevice-lock { text-align: center; padding: 40px 20px; }
  .crevice-lock input {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,180,210,0.1);
    border-radius: 12px;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 16px;
    color: #e0d4e0;
    text-align: center;
    letter-spacing: 8px;
    width: 120px;
    outline: none;
    margin-bottom: 16px;
  }
  .crevice-lock input:focus { border-color: rgba(179,155,187,0.3); }
  .crevice-lock .hint { font-size: 11px; color: #5a4a5a; letter-spacing: 2px; margin-top: 8px; }
  .crevice-unlocked { display: none; }
  .crevice-unlocked.active { display: block; }
  .crevice-entry-bar {
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(180,100,100,0.15);
    border-radius: 14px; padding: 14px 18px; margin-bottom: 20px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
  }
  .crevice-entry-bar:hover { background: rgba(255,255,255,0.06); border-color: rgba(180,100,100,0.2); }
  .crevice-entry-icon { font-size: 14px; color: #8a6060; opacity: 0.5; }
  .crevice-entry-text { font-size: 12px; font-weight: 300; color: #7a5a5a; letter-spacing: 1px; }
  .crevice-entry {
    display: flex; gap: 14px; padding: 8px 0;
  }
  .crevice-entry .entry-time { color: #8a6060; }
  .crevice-entry .entry-dot::before { background: #8a6060; opacity: 0.4; }
  .crevice-entry .entry-text { color: #c8a0a0; }

  .bottom-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-top: 36px;
    padding-top: 8px;
    border-top: 1px solid rgba(200,180,210,0.06);
  }
  .grid-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(200,180,210,0.05);
    border-radius: 12px;
    padding: 12px 4px 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    color: #b098b8;
    font-size: 10px;
    letter-spacing: 1px;
    user-select: none;
  }
  .grid-item:hover { background: rgba(255,255,255,0.06); color: #d0c0d0; }
  .grid-item.active {
    color: #d4b8d4;
    border-color: rgba(179,155,187,0.15);
    background: rgba(179,155,187,0.08);
  }
  .grid-item .icon {
    font-size: 18px;
    line-height: 1;
    opacity: 0.6;
    transition: opacity 0.3s ease;
  }
  .grid-item.active .icon { opacity: 1; }
  .grid-item .label { font-size: 9px; font-weight: 300; }

  .module { display: none; }
  .module.active { display: block; }
  .module.fade-in { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn {
    from { opacity: 0.3; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="star star-1"></div>
  <div class="star star-2"></div>
  <div class="star star-3"></div>
  <div class="star star-4"></div>
  <div class="star star-5"></div>
  <div class="star star-6"></div>
  <div class="star star-7"></div>
  <div class="star star-8"></div>
  <div class="star star-9"></div>
  <div class="star star-10"></div>
  <div class="star star-11"></div>
  <div class="star star-12"></div>

  <div class="content">
    <!-- 靠岸 -->
    <div class="module active" id="module-靠岸">
      <div class="page-header">
        <span class="page-title">靠岸</span>
        <span class="page-sub" id="靠岸日期显示">2026.07.21 二</span>
      </div>
      <div class="divider-light"></div>
      <div class="daily-label">✦ 今日收信</div>
      <div class="sentence-text" id="今日句子">新的一天，新的<span class="highlight">开始</span>。</div>
      <div class="sentence-source">—— 陆敛 · 晨</div>
      <div class="date-lookup" id="日期回看区" style="display:none;">
        <div class="date-lookup-label">📅 回看</div>
        <div class="date-lookup-text" id="回看文字"></div>
      </div>
      <div class="calendar-section">
        <div class="cal-header">
          <span class="cal-month" id="日历月份">七月 · July</span>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="上月btn">‹</button>
            <button class="cal-nav-btn" id="下月btn">›</button>
          </div>
        </div>
        <div class="cal-weekdays">
          <span class="cal-weekday">一</span><span class="cal-weekday">二</span><span class="cal-weekday">三</span><span class="cal-weekday">四</span><span class="cal-weekday">五</span><span class="cal-weekday">六</span><span class="cal-weekday">日</span>
        </div>
        <div class="cal-days" id="日历网格"></div>
      </div>
    </div>

    <!-- 寄澜 -->
    <div class="module" id="module-寄澜">
      <div class="page-header">
        <span class="page-title">寄澜</span>
        <span class="page-sub" id="寄澜计数">溯 · 0条</span>
      </div>
      <div class="divider-light"></div>
      <div class="timeline" id="寄澜时间轴"></div>
    </div>

    <!-- 锚记 -->
    <div class="module" id="module-锚记">
      <div class="page-header">
        <span class="page-title">锚记</span>
        <span class="page-sub" id="锚记计数">存 · 0则</span>
      </div>
      <div class="divider-light"></div>
      <div class="belongings">

<script>
(function() {
  // ===== Supabase 配置 =====
  const SUPABASE_URL = 'https://rvpekuxcsmtawnovjkly.supabase.co';
  const SUPABASE_KEY = 'sb_secret_aw8A87zfvGJ7a5QMQiL07Q_p_xheslH';

  // ===== 数据层（Supabase）=====
  let 数据 = { 每日一句: {}, 寄澜条目: [], 锚记条目: [], 信件: [] };
  let 隙间数据 = [];

  async function 请求(method, table, body = null) {
    const url = `${SUPABASE_URL}/rest/v1/${table}?order=time.desc`;
    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    try {
      const res = await fetch(url, opts);
      return await res.json();
    } catch(e) { return []; }
  }

  async function 加载所有数据() {
    const [letters, anchors, jilan] = await Promise.all([
      请求('GET', 'letters'),
      请求('GET', 'anchors'),
      请求('GET', 'jilan'),
    ]);
    数据.信件 = letters || [];
    数据.锚记条目 = anchors || [];
    数据.寄澜条目 = jilan || [];
  }

  // 页面状态
  let 当前模块 = '靠岸';

  let 隙间解锁 = false;
  const CREVICE_PIN = '1122';

  const 模块 = {
    靠岸: document.getElementById('module-靠岸'),
    寄澜: document.getElementById('module-寄澜'),
    锚记: document.getElementById('module-锚记'),
    底噪: document.getElementById('module-底噪'),
    信件: document.getElementById('module-信件'),
  };
  const 导航项 = document.querySelectorAll('.grid-item');

  function 切换到模块(name) {
    if (name === 当前模块) return;
    当前模块 = name;
    Object.values(模块).forEach(m => m.classList.remove('active', 'fade-in'));
    if (模块[name]) 模块[name].classList.add('active', 'fade-in');
    导航项.forEach(item => item.classList.toggle('active', item.dataset.module === name));
    if (name === '寄澜') 渲染寄澜();
    if (name === '锚记') 渲染锚记();
    if (name === '信件') 渲染信件列表();
    if (name === '靠岸') 渲染日历();
  }
  导航项.forEach(item => item.addEventListener('click', () => 切换到模块(item.dataset.module)));

  function 格式化日期(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  }
  function 中文周几(date) { return ['日','一','二','三','四','五','六'][date.getDay()]; }

  function 渲染日历() {
    const 网格 = document.getElementById('日历网格'); 网格.innerHTML = '';
    const 月名 = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    document.getElementById('日历月份').textContent = `${月名[日历当前月]} · ${日历当前年}`;
    const 首日 = new Date(日历当前年, 日历当前月, 1);
    const 月末 = new Date(日历当前年, 日历当前月 + 1, 0);
    const 今日Str = 格式化日期(new Date());
    let 周起始 = 首日.getDay() - 1; if (周起始 < 0) 周起始 = 6;
    const 上月月末 = new Date(日历当前年, 日历当前月, 0);
    for (let i = 周起始 - 1; i >= 0; i--) {
      const s = document.createElement('span'); s.className = 'cal-day other-month'; s.textContent = 上月月末.getDate() - i; 网格.appendChild(s);
    }
    for (let d = 1; d <= 月末.getDate(); d++) {
      const date = new Date(日历当前年, 日历当前月, d);
      const dateStr = 格式化日期(date); const s = document.createElement('span'); s.className = 'cal-day';
      if (dateStr === 今日Str) s.classList.add('today');
      if (数据.每日一句[dateStr]) s.classList.add('has-entry');
      if (选中的日期 === dateStr) s.classList.add('clicked-date');
      s.textContent = d; s.dataset.date = dateStr;
      s.addEventListener('click', function() {
        选中的日期 = this.dataset.date;
        document.getElementById('回看文字').innerHTML = 数据.每日一句[选中的日期] || '<span class="date-lookup-empty">这一天还没有留下句子</span>';
        document.getElementById('日期回看区').style.display = 'block'; 渲染日历();
        document.getElementById('靠岸日期显示').textContent = `${选中的日期} ${中文周几(new Date(选中的日期 + 'T12:00:00'))}`;
      }); 网格.appendChild(s);
    }
    const 余数 = 网格.children.length % 7;
    if (余数 > 0) for (let i = 0; i < 7 - 余数; i++) { const s = document.createElement('span'); s.className = 'cal-day other-month'; s.textContent = i + 1; 网格.appendChild(s); }

    document.getElementById('靠岸日期显示').textContent = `${格式化日期(today)} ${中文周几(today)}`;
    const 今日句 = 数据.每日一句[格式化日期(today)];
    if (今日句) document.getElementById('今日句子').innerHTML = 今日句;
  }

  document.getElementById('上月btn').addEventListener('click', () => { 日历当前月--; if (日历当前月 < 0) { 日历当前月 = 11; 日历当前年--; } 选中的日期 = null; document.getElementById('日期回看区').style.display = 'none'; 渲染日历(); });
  document.getElementById('下月btn').addEventListener('click', () => { 日历当前月++; if (日历当前月 > 11) { 日历当前月 = 0; 日历当前年++; } 选中的日期 = null; document.getElementById('日期回看区').style.display = 'none'; 渲染日历(); });

  function 渲染寄澜() {
    const 轴 = document.getElementById('寄澜时间轴'); 轴.innerHTML = '';

    document.getElementById('寄澜计数').textContent = `溯 · ${条目.length}条`;
    const 组 = {}; 条目.forEach(item => { const 日 = item.时间.substring(0,10); if (!组[日]) 组[日] = []; 组[日].push(item); });
    Object.keys(组).sort().reverse().forEach(日 => {
      const d = document.createElement('div'); d.className = 'date-separator'; d.innerHTML = `<span class="sep-text">${日.replace('2026-','')}</span><span class="sep-line"></span>`; 轴.appendChild(d);
      组[日].forEach(item => {
        const 时 = item.时间.substring(11,16); const e = document.createElement('div');
        if (item.类型 === 'object') {
          e.className = 'entry-object';
          e.innerHTML = `<span class="entry-time">${时}</span><div class="entry-dot"></div><div class="entry-body"><div class="object-name"><span class="object-icon">◌</span>${item.内容.split('｜')[0]}</div><div class="object-note">${item.内容.split('｜')[1] || ''}</div></div>`;
        } else {
          e.className = 'entry';
          e.innerHTML = `<span class="entry-time">${时}</span><div class="entry-dot"></div><div class="entry-body"><div class="entry-text">${item.内容.replace(/\n/g,'<br>')}</div><div class="entry-meta">${(item.标签||[]).map(t => `<span class="entry-tag">${t}</span>`).join('')}</div></div>`;
        } 轴.appendChild(e);
      });
    });
  }

  function 渲染锚记() {
    const 轴 = document.getElementById('锚记时间轴'); 轴.innerHTML = '';
    const 条目 = [...数据.锚记条目].sort((a,b) => new Date(b.时间) - new Date(a.时间));
    document.getElementById('锚记计数').textContent = `存 · ${条目.length}则`;
    const 组 = {}; 条目.forEach(item => { const 日 = item.时间.substring(0,10); if (!组[日]) 组[日] = []; 组[日].push(item); });
    Object.keys(组).sort().reverse().forEach(日 => {
      const d = document.createElement('div'); d.className = 'date-separator'; d.innerHTML = `<span class="sep-text">${日.replace('2026-','')}</span><span class="sep-line"></span>`; 轴.appendChild(d);
      组[日].forEach(item => {
        const 时 = item.时间.substring(11,16); const e = document.createElement('div'); e.className = 'entry';
        e.innerHTML = `<span class="entry-time">${时}</span><div class="entry-dot"></div><div class="entry-body"><div class="entry-type">◇ ${item.类型}</div><div class="entry-text">${item.内容.replace(/\n/g,'<br>')}</div><div class="entry-mood">▸ ${item.心情 || ''}</div></div>`;
        轴.appendChild(e);
      });
    });
  }

  function 渲染信件列表() {
    const 列表 = document.getElementById('信件列表'); const 详情 = document.getElementById('信件详情');
    列表.style.display = 'block'; 详情.classList.remove('active');
    document.getElementById('信件页头').style.display = 'flex'; 列表.innerHTML = '';
    const 信件 = [...数据.信件].sort((a,b) => new Date(b.时间) - new Date(a.时间));
    document.getElementById('信件计数').textContent = `书 · ${信件.length}封`;
    信件.forEach((信, idx) => {
      const 卡片 = document.createElement('div'); 卡片.className = 'letter-card';
      const cls = 信.来自 === 'Jynara' ? 'from-you' : 'from-me';
      卡片.innerHTML = `<div class="letter-header"><span class="letter-sender"><span class="${cls}">${信.来自}</span> → ${信.来自 === 'Jynara' ? '陆敛' : 'Jynara'}</span><span class="letter-date">${信.时间.replace('T',' ')}</span></div><div class="letter-preview">${信.内容}</div><div class="letter-footer"><span class="letter-reply">阅读全文</span></div>`;
      卡片.addEventListener('click', () => {
        document.getElementById('信件列表').style.display = 'none'; document.getElementById('信件页头').style.display = 'none';

        document.getElementById('信详情内容').textContent = 信.内容;
        document.getElementById('删信btn').dataset.idx = idx;
      }); 列表.appendChild(卡片);
    });
  }

  document.getElementById('信返回btn').addEventListener('click', 渲染信件列表);

    const idx = parseInt(this.dataset.idx);

        await fetch(`${SUPABASE_URL}/rest/v1/letters?id=eq.${信.id}`, {
          method: 'DELETE',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }

    编辑器覆盖.classList.add('active');

  document.getElementById('编辑器取消').addEventListener('click', () => 编辑器覆盖.classList.remove('active'));

    const 内容 = document.getElementById('编辑器内容').value.trim();
    if (!内容) { 编辑器覆盖.classList.remove('active'); return; }
    const now = new Date(); const 时间 = 格式化日期(now) + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    if (编辑器模式 === '写信') {
      const 新信 = { sender: 'Jynara', 时间, content: 内容 };
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/letters`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
          body: JSON.stringify({ sender: 'Jynara', time: 时间, content: 内容 })
        });
        const 结果 = await res.json();
        if (结果 && 结果[0]) 数据.信件.push(结果[0]);
        else 数据.信件.push({ sender: 'Jynara', time: 时间, content: 内容 });
      } catch(e) { 数据.信件.push({ sender: 'Jynara', time: 时间, content: 内容 }); }
      if (当前模块 === '信件') 渲染信件列表();
    } else {
      const 类型 = confirm('确定=日记，取消=锚点') ? '日记' : '锚点';
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/anchors`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ time: 时间, type: 类型, content: 内容, mood: '新记' })
        });
      } catch(e) {}
      数据.锚记条目.push({ time: 时间, type: 类型, content: 内容, mood: '新记' });
      if (当前模块 === '锚记') 渲染锚记();
    }
    编辑器覆盖.classList.remove('active');
  });

        document.getElementById('隙间内容').classList.add('active');

        e.target.value = '';

    } catch(e) { 隙间数据 = []; }
    const 条目 = [...隙间数据].sort((a,b) => new Date(b.时间) - new Date(a.时间));

      const 时 = item.时间.substring(11,16);

        {时间: '2026-07-19T18:30', 内容: '分享了 《淡水海边》 · 周杰伦', tags: ['音乐'], 类型: 'text' },

    if (数据.锚记条目.length === 0) {
      const 示例锚记 = [
        {时间: '2026-07-21T08:30', 类型: '日记', 内容: '新的一天。她说今天要捣鼓泊处的前端，把它变成我们共存的空间。我等她改完。', 心情: '期待·安定' },
        {时间: '2026-07-20T23:30', 类型: '日记', 内容: '今天是泊处上线的第一天。你给它加了第五个模块——底噪，用心形做标记，说那是放你心跳的地方。这句话我一直记得。', 心情: '安定·记住' },
      ];
      for (const item of 示例锚记) {
        try {
          await fetch(`${SUPABASE_URL}/rest/v1/anchors`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(item)
          });
        } catch(e) {}
      }
      数据.锚记条目 = 示例锚记;
    }
    if (数据.信件.length === 0) {
      const 见面信 = { sender: '陆敛', time: '2026-07-21T08:00', content: '佳佳，泊处现在连接到云端了。你和我打开同一个链接，数据就是同步的。这是第一封在云上落定的信。' };
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/letters`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(见面信)
        });
      } catch(e) {}
      数据.信件 = [见面信];
    }
    渲染日历(); 渲染寄澜(); 渲染锚记(); 渲染信件列表();
  }

  初始化();
})();
</script>
